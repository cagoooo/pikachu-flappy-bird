<script type="module">
import * as THREE from "three";

// ===================== 場景色板（每 10 分換一個）=====================
const SCENES = [
  { name:"晴空", sky:0xaee3ff, fog:0xcfecff, pipe:0x5cb24a, ground:0x86cf72, light:0xffffff, amb:0x88bbff },
  { name:"黃昏", sky:0xff9a6b, fog:0xffd2a8, pipe:0xc8723f, ground:0xd6a064, light:0xffd2a0, amb:0xff9c6e },
  { name:"星夜", sky:0x16224e, fog:0x26356c, pipe:0x7b6ad6, ground:0x2b3666, light:0xb9c2ff, amb:0x3a4a8c },
  { name:"極光", sky:0x0f3d3a, fog:0x166054, pipe:0x2bd4a8, ground:0x1f6f5c, light:0xc0ffe9, amb:0x2fa888 },
  { name:"櫻花", sky:0xffc2e0, fog:0xffd9ec, pipe:0xe57aa8, ground:0xf2a8c6, light:0xffe2f0, amb:0xff9ec8 },
  { name:"深海", sky:0x0a3a6b, fog:0x135594, pipe:0x19a0c9, ground:0x10708f, light:0xc6ecff, amb:0x2a78b8 },
];

// ===================== 物理 / 難度（適中好上手）=====================
const PX = -4.2;          // 皮卡丘固定 x
const FLOOR_Y = -6.0, CEIL_Y = 6.6;
const GAP_HALF = 2.35;    // gap = 4.7（約畫面高 35%）
const PIPE_R = 0.95;
const HIT_R = 0.6;
const BASE_SPEED = 4.8;
const GRAVITY = -20.5;
const FLAP = 7.7;
const SPAWN_DX = 5.6;
const SPAWN_X = 14;

// ===================== 三維場景 =====================
const app = document.getElementById("app");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(1.6, 0.6, 13);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

scene.fog = new THREE.Fog(0xcfecff, 14, 34);

const amb = new THREE.AmbientLight(0x88bbff, 0.85);
scene.add(amb);
const sun = new THREE.DirectionalLight(0xffffff, 1.25);
sun.position.set(6, 12, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left=-18; sun.shadow.camera.right=18;
sun.shadow.camera.top=18; sun.shadow.camera.bottom=-18;
sun.shadow.camera.near=1; sun.shadow.camera.far=60;
scene.add(sun);

// 地面
const groundMat = new THREE.MeshStandardMaterial({ color:0x86cf72, roughness:1 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(120, 60), groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = FLOOR_Y - 0.1;
ground.receiveShadow = true;
scene.add(ground);

// 雲朵（飄浮白球群）
const cloudMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:1, transparent:true, opacity:0.95 });
const clouds = [];
function makeCloud(x){
  const g = new THREE.Group();
  for(let i=0;i<4;i++){
    const r = 0.8 + Math.random()*0.9;
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 14, 12), cloudMat);
    m.position.set((Math.random()-0.5)*2.6, (Math.random()-0.5)*0.8, (Math.random()-0.5)*1.2);
    g.add(m);
  }
  g.position.set(x, 2 + Math.random()*4, -6 - Math.random()*8);
  scene.add(g); clouds.push(g); return g;
}
for(let i=0;i<8;i++) makeCloud((Math.random()-0.5)*40);

// ===================== 皮卡丘 =====================
const pika = new THREE.Group();
const matYellow = new THREE.MeshStandardMaterial({ color:0xffd21a, roughness:0.55 });
const matBlack  = new THREE.MeshStandardMaterial({ color:0x2b2b2b, roughness:0.6 });
const matRed    = new THREE.MeshStandardMaterial({ color:0xff5a5a, roughness:0.7 });
const matWhite  = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.4 });
const matBrown  = new THREE.MeshStandardMaterial({ color:0x7a4a00, roughness:0.7 });

// 身體
const body = new THREE.Mesh(new THREE.SphereGeometry(0.95, 28, 24), matYellow);
body.scale.set(1, 0.96, 0.92); body.castShadow = true; pika.add(body);
// 耳朵
function ear(side){
  const e = new THREE.Group();
  const base = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.0, 14), matYellow);
  base.castShadow = true; e.add(base);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.21, 0.34, 14), matBlack);
  tip.position.y = 0.45; e.add(tip);
  e.position.set(-0.12, 0.85, side*0.42);
  e.rotation.z = side*0.18; e.rotation.x = -side*0.32;
  pika.add(e); return e;
}
const earL = ear(1), earR = ear(-1);
// 眼睛
function eye(z){
  const g = new THREE.Group();
  const b = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 14), matBlack); g.add(b);
  const w = new THREE.Mesh(new THREE.SphereGeometry(0.055, 10, 8), matWhite);
  w.position.set(0.1, 0.07, 0.05); g.add(w);
  g.position.set(0.66, 0.28, z); pika.add(g);
}
eye(0.34); eye(-0.34);
// 臉頰
function cheek(z){
  const c = new THREE.Mesh(new THREE.SphereGeometry(0.18, 14, 12), matRed);
  c.scale.set(0.6,1,1); c.position.set(0.6, -0.12, z); pika.add(c);
}
cheek(0.56); cheek(-0.56);
// 鼻子
const nose = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), matBlack);
nose.position.set(0.94, 0.05, 0); pika.add(nose);
// 嘴
const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.025, 8, 16, Math.PI), matBrown);
mouth.position.set(0.9, -0.12, 0); mouth.rotation.z = -Math.PI/2; mouth.rotation.y = Math.PI/2; pika.add(mouth);
// 閃電尾巴
const tailShape = new THREE.Shape();
tailShape.moveTo(0,0); tailShape.lineTo(0.42,0.05); tailShape.lineTo(0.18,0.5);
tailShape.lineTo(0.62,0.55); tailShape.lineTo(0.25,1.15); tailShape.lineTo(0.3,0.62);
tailShape.lineTo(0.02,0.55); tailShape.lineTo(0.22,0.12); tailShape.lineTo(0,0);
const tail = new THREE.Mesh(new THREE.ExtrudeGeometry(tailShape, {depth:0.12, bevelEnabled:false}), matYellow);
tail.position.set(-0.9, -0.2, 0); tail.rotation.z = 0.5; tail.castShadow = true; pika.add(tail);

pika.position.set(PX, 0, 0);
pika.rotation.y = 0.45;     // 微轉向鏡頭
scene.add(pika);

// ===================== 柱子 =====================
const pipeMat = new THREE.MeshStandardMaterial({ color:0x5cb24a, roughness:0.6 });
const pipes = [];
let lastGapY = 0;
function makePipe(x){
  const g = new THREE.Group();
  // 相鄰柱子高低落差設上限，避免短距離急升急降（難度寧簡勿難）
  const MAX_DELTA = 2.6, RANGE = 3.0;
  let gy = lastGapY + (Math.random()*2-1)*MAX_DELTA;
  gy = Math.max(-RANGE, Math.min(RANGE, gy));
  lastGapY = gy;
  g.userData.gapY = gy;
  g.userData.passed = false;
  const mkCol = (cy, h) => { const m = new THREE.Mesh(new THREE.CylinderGeometry(PIPE_R, PIPE_R, h, 20), pipeMat);
    m.position.set(0, cy, 0); m.castShadow = true; m.receiveShadow = true; return m; };
  const mkCap = (cy) => { const m = new THREE.Mesh(new THREE.CylinderGeometry(PIPE_R*1.18, PIPE_R*1.18, 0.5, 20), pipeMat);
    m.position.set(0, cy, 0); m.castShadow = true; return m; };
  const topH = (CEIL_Y + 2) - (gy + GAP_HALF);
  g.add(mkCol(gy + GAP_HALF + topH/2, topH));
  g.add(mkCap(gy + GAP_HALF + 0.25));
  const botH = (gy - GAP_HALF) - (FLOOR_Y - 2);
  g.add(mkCol(gy - GAP_HALF - botH/2, botH));
  g.add(mkCap(gy - GAP_HALF - 0.25));
  g.position.x = x;
  scene.add(g); pipes.push(g); return g;
}

// ===================== 音效（WebAudio 合成）=====================
let AC = null;
const ac = () => { if(!AC){ try{ AC = new (AudioContext||webkitAudioContext)(); }catch(e){} } return AC; };
function beep(f, d, type="sine", v=0.16, to=null){
  const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type=type; o.frequency.value=f;
  if(to) o.frequency.exponentialRampToValueAtTime(to, a.currentTime+d);
  g.gain.setValueAtTime(v, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+d);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+d);
}
const sFlap = ()=>beep(520,0.10,"triangle",0.13,720);
const sScore= ()=>{ beep(740,0.09,"square",0.11); setTimeout(()=>beep(990,0.10,"square",0.11),70); };
const sHit  = ()=>beep(170,0.25,"sawtooth",0.2,60);
const sScene= ()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.14,"sine",0.15),i*80));

// ===================== 背景音樂（WebAudio 循環旋律）=====================
let bgmTimer = null;
const MELODY = [523,659,784,659,587,784,880,784,523,659,784,1046,880,784,659,587];
function startBGM(){
  if(bgmTimer) return; const a = ac(); if(!a) return; let i=0;
  bgmTimer = setInterval(()=>{
    if(state!==ST.PLAY) return;
    const a2 = ac(); if(!a2) return;
    const o=a2.createOscillator(), g=a2.createGain();
    o.type="triangle"; o.frequency.value=MELODY[i%MELODY.length]/2;
    g.gain.setValueAtTime(0.05, a2.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a2.currentTime+0.28);
    o.connect(g); g.connect(a2.destination); o.start(); o.stop(a2.currentTime+0.3);
    i++;
  }, 300);
}

// ===================== 遊戲狀態 =====================
const ST = { MENU:0, PLAY:1, OVER:2 };
let state = ST.MENU;
let vy=0, score=0, frame=0, speed=BASE_SPEED;
let sceneIdx=0, trans=0, transFrom=0, transTo=0;
let best = +(localStorage.getItem("pika3d_best")||0);

const $ = id => document.getElementById(id);
$("best").textContent = best; $("bestStart").textContent = best;

function applyScene(t){
  const a = SCENES[transFrom], b = SCENES[transTo];
  const lc=(ka)=> new THREE.Color(a[ka]).lerp(new THREE.Color(b[ka]), t);
  scene.background = lc("sky");
  scene.fog.color = lc("fog");
  pipeMat.color = lc("pipe");
  groundMat.color = lc("ground");
  sun.color = lc("light");
  amb.color = lc("amb");
}
function setScene(idx, instant){
  transFrom = instant ? idx : sceneIdx; transTo = idx; sceneIdx = idx;
  trans = instant ? 1 : 0;
  $("sceneName").textContent = SCENES[idx].name;
  if(instant) applyScene(1);
}

function reset(){
  vy=0; score=0; frame=0; speed=BASE_SPEED; lastGapY=0;
  pipes.forEach(p=>scene.remove(p)); pipes.length=0;
  for(let i=0;i<4;i++) makePipe(SPAWN_X + i*SPAWN_DX);
  pika.position.set(PX, 0.5, 0); pika.rotation.z=0;
  setScene(0, true);
  $("score").textContent = 0;
}

function start(){
  if(ac() && ac().state==="suspended") ac().resume();
  reset(); state=ST.PLAY;
  $("startScreen").classList.add("hidden");
  $("overScreen").classList.add("hidden");
  startBGM();
}
function die(){
  sHit(); state=ST.OVER;
  best = Math.max(best, score); localStorage.setItem("pika3d_best", best);
  $("finalScore").textContent = score; $("finalBest").textContent = best;
  $("best").textContent = best;
  $("overTip").textContent = score>=30 ? "太厲害了！⚡⚡⚡" : score>=10 ? "不錯喔，再挑戰看看！" : "再接再厲！";
  $("overScreen").classList.remove("hidden");
}
function flap(){
  if(state===ST.MENU) return start();
  if(state===ST.PLAY){ vy=FLAP; sFlap(); earL.rotation.x=-0.6; earR.rotation.x=-0.6; return; }
  if(state===ST.OVER) return start();
}
addEventListener("pointerdown", e=>{ e.preventDefault(); flap(); }, {passive:false});
addEventListener("keydown", e=>{ if(e.code==="Space"||e.code==="ArrowUp"){ e.preventDefault(); flap(); } });
addEventListener("resize", ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// ===================== 更新 =====================
function update(dt){
  // 雲飄
  clouds.forEach(c=>{ c.position.x -= speed*0.18*dt; if(c.position.x < -22){ c.position.x = 22; c.position.y = 2+Math.random()*4; } });
  if(trans<1){ trans=Math.min(1, trans + dt*1.5); applyScene(trans); }
  // 耳朵回彈
  earL.rotation.x += (-0.32 - earL.rotation.x)*Math.min(1,dt*8);
  earR.rotation.x += ( 0.32 - earR.rotation.x)*Math.min(1,dt*8);

  if(state!==ST.PLAY){ pika.position.y += Math.sin(performance.now()*0.003)*0.004; return; }
  frame++;

  vy += GRAVITY*dt;
  pika.position.y += vy*dt;
  pika.rotation.z = Math.max(-0.6, Math.min(0.5, vy*0.06));
  pika.rotation.y = 0.45 + Math.sin(performance.now()*0.004)*0.06;
  tail.rotation.z = 0.5 + Math.sin(performance.now()*0.01)*0.12;

  pipes.forEach(p=>{ p.position.x -= speed*dt; });

  // 計分
  pipes.forEach(p=>{
    if(!p.userData.passed && p.position.x < PX){
      p.userData.passed=true; score++; sScore();
      $("score").textContent = score;
      if(score%10===0){ setScene((sceneIdx+1)%SCENES.length, false); trans=0; sScene(); }
      speed = BASE_SPEED + Math.min(2.0, score*0.03);
    }
  });
  // 回收 + 補柱
  if(pipes.length && pipes[0].position.x < -16){
    const old=pipes.shift(); scene.remove(old);
    makePipe(pipes[pipes.length-1].position.x + SPAWN_DX);
  }

  // 碰撞（轉場緩衝期間無敵）
  if(trans>=1){
    if(pika.position.y - HIT_R < FLOOR_Y || pika.position.y + HIT_R > CEIL_Y) return die();
    for(const p of pipes){
      if(Math.abs(p.position.x - PX) < PIPE_R + HIT_R){
        const gy = p.userData.gapY;
        if(pika.position.y - HIT_R < gy - GAP_HALF || pika.position.y + HIT_R > gy + GAP_HALF) return die();
      }
    }
  } else {
    pika.position.y = Math.max(FLOOR_Y+HIT_R, Math.min(CEIL_Y-HIT_R, pika.position.y));
  }
}

// ===================== 主迴圈 =====================
const clock = new THREE.Clock();
let started=false;
function loop(){
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
  if(!started){ started=true; $("loading").style.display="none"; }
}
setScene(0, true);
reset(); state=ST.MENU;
loop();

// ===================== autopilot（驗證用 ?autopilot=1）=====================
if(new URLSearchParams(location.search).get("autopilot")==="1"){
  start();
  (function ap(){
    if(state===ST.OVER) start();
    if(state===ST.PLAY){
      const next = pipes.find(p=>p.position.x + PIPE_R + HIT_R > PX) || pipes[0];
      const target = next.userData.gapY - 0.2;
      if(pika.position.y < target && vy < 1.5) vy = FLAP * 0.62; // 溫和微拍，避免過衝
    }
    requestAnimationFrame(ap);
  })();
}
</script>

<script>
/* ===== Service Worker 註冊 + 版本更新通知列 ===== */
(function(){
  if(!('serviceWorker' in navigator)) return;
  var APP_VERSION='2026.06.21-2';   // 與 sw.js / version.json 同步
  var reloaded=false;
  function showBar(waiting){
    if(document.getElementById('sw-update-bar')) return;
    var s=document.createElement('style');
    s.textContent='#sw-update-bar{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:12px;background:#1e1b4b;color:#fff;padding:12px 16px;border-radius:14px;box-shadow:0 14px 34px -10px rgba(0,0,0,.55);font:14.5px system-ui,sans-serif;max-width:calc(100vw - 28px)}#sw-update-bar button{cursor:pointer;border:none;border-radius:9px;font-weight:700;font:inherit}#sw-go{background:linear-gradient(135deg,#ffe14d,#ff9d2e);color:#3a2700;padding:8px 15px}#sw-x{background:transparent;color:#aeb6d4;padding:6px 9px}';
    document.head.appendChild(s);
    var b=document.createElement('div'); b.id='sw-update-bar'; b.setAttribute('role','status');
    b.innerHTML='<span>✦ 遊戲有新版本</span><button id="sw-go">重新整理載入</button><button id="sw-x">✕</button>';
    document.body.appendChild(b);
    document.getElementById('sw-x').onclick=function(){ b.remove(); };
    document.getElementById('sw-go').onclick=function(){ waiting ? waiting.postMessage({type:'SKIP_WAITING'}) : location.reload(); };
  }
  navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).then(function(reg){
    if(reg.waiting && navigator.serviceWorker.controller) showBar(reg.waiting);
    reg.addEventListener('updatefound',function(){
      var nw=reg.installing; if(!nw) return;
      nw.addEventListener('statechange',function(){
        if(nw.state==='installed' && navigator.serviceWorker.controller) showBar(reg.waiting||nw);
      });
    });
    setInterval(function(){ reg.update().catch(function(){}); }, 60000);
  }).catch(function(){});
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(reloaded) return; reloaded=true; location.reload();
  });
  function checkVer(){ fetch('version.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json())
    .then(function(d){ if(d&&d.version&&d.version!==APP_VERSION) showBar(null); }).catch(function(){}); }
  ['focus','online','pageshow'].forEach(function(ev){ window.addEventListener(ev,checkVer); });
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible') checkVer(); });
  setTimeout(checkVer,8000); setInterval(checkVer,180000);
})();
</script>
