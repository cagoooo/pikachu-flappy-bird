<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#0b1020;
    font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif; }
  #app{ position:fixed; inset:0; }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }

  /* ---- HUD ---- */
  #hud{ position:fixed; inset:0; pointer-events:none; z-index:5; color:#fff; }
  #score{ position:absolute; top:18px; left:50%; transform:translateX(-50%);
    font-size:clamp(48px,9vw,96px); font-weight:900; line-height:1;
    text-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 18px rgba(0,0,0,.35); }
  #combo{ position:absolute; top:calc(18px + clamp(48px,9vw,96px)); left:50%; transform:translateX(-50%);
    font-weight:900; font-size:clamp(16px,3.6vw,28px); color:#ffe14d;
    text-shadow:0 2px 8px rgba(0,0,0,.55); opacity:0; transition:opacity .18s, transform .18s; }
  #combo.show{ opacity:1; }
  #items{ position:absolute; top:16px; left:16px; display:flex; flex-direction:column; gap:6px;
    font-weight:900; font-size:clamp(13px,2.8vw,18px); text-shadow:0 2px 6px rgba(0,0,0,.6); }
  #items .it{ background:rgba(0,0,0,.32); padding:3px 10px; border-radius:999px; }
  #meta{ position:absolute; top:16px; right:18px; text-align:right; font-weight:800;
    font-size:clamp(13px,2.4vw,18px); text-shadow:0 2px 6px rgba(0,0,0,.5); line-height:1.5; }
  #meta .scene{ background:rgba(0,0,0,.28); padding:2px 10px; border-radius:999px; display:inline-block; }

  /* ---- 疊層面板 ---- */
  .overlay{ position:fixed; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; color:#fff;
    background:radial-gradient(circle at 50% 35%,rgba(20,30,60,.30),rgba(8,12,30,.66));
    backdrop-filter:blur(2px); padding:24px; cursor:pointer; }
  .overlay.hidden{ display:none; }
  .title{ font-size:clamp(34px,7vw,68px); font-weight:900; letter-spacing:2px;
    text-shadow:0 6px 0 rgba(0,0,0,.25), 0 0 30px rgba(120,180,255,.5); margin-bottom:6px; }
  .title .bolt{ color:#ffe14d; }
  .sub{ font-size:clamp(15px,2.8vw,22px); opacity:.95; margin-bottom:16px; font-weight:700; }
  .big{ font-size:clamp(22px,4vw,34px); font-weight:900; margin:10px 0 4px; }
  .cta{ margin-top:18px; font-size:clamp(16px,3vw,22px); font-weight:800;
    background:linear-gradient(135deg,#ffe14d,#ff9d2e); color:#3a2700;
    padding:14px 34px; border-radius:999px; box-shadow:0 10px 26px -6px rgba(255,160,40,.7);
    animation:pulse 1.4s ease-in-out infinite; border:none; font-family:inherit; cursor:pointer; }
  @keyframes pulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.06);} }
  .credit{ position:fixed; bottom:14px; left:0; right:0; text-align:center;
    font-size:12px; color:rgba(255,255,255,.85); text-shadow:0 1px 4px rgba(0,0,0,.6); }
  .credit a{ color:#ffe14d; font-weight:700; text-decoration:none; }
  #loading{ position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:#0b1020; color:#ffe14d; font-size:20px; font-weight:800; letter-spacing:1px; }
  /* ---- 班級排行榜 ---- */
  .overlay{ overflow-y:auto; justify-content:flex-start; padding-top:5vh; padding-bottom:7vh; }
  .lb{ background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
    border-radius:16px; padding:12px 16px; margin:14px 0; width:min(92vw,360px); }
  .lb-title{ font-weight:900; font-size:18px; margin-bottom:8px; }
  .lb-list{ list-style:none; margin:0; padding:0; max-height:30vh; overflow-y:auto; text-align:left; }
  .lb-list li{ display:flex; justify-content:space-between; gap:10px; padding:5px 8px;
    border-radius:8px; font-weight:700; font-size:15px; }
  .lb-list li:nth-child(odd){ background:rgba(255,255,255,.08); }
  .lb-list li .rank{ width:30px; color:#ffe14d; flex:none; }
  .lb-list li .nm{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-list li .sc{ font-weight:900; flex:none; }
  .lb-list li.me{ background:rgba(255,225,77,.30); }
  .lb-empty{ opacity:.75; justify-content:center !important; }
  .submit-row{ display:flex; gap:8px; margin:8px 0 2px; width:min(92vw,360px); }
  .submit-row input{ flex:1; min-width:0; border:none; border-radius:10px; padding:10px 12px; font:inherit; font-size:16px; }
  .btn-go{ border:none; border-radius:10px; padding:10px 16px; font-weight:800; font:inherit;
    cursor:pointer; background:linear-gradient(135deg,#ffe14d,#ff9d2e); color:#3a2700; }
  .btn-go:disabled{ opacity:.55; }
  /* ---- 選項（難度 / 角色 / 設定）---- */
  .opt{ width:min(92vw,360px); margin:7px 0; }
  .opt h4{ font-size:12px; opacity:.8; margin-bottom:6px; font-weight:800; letter-spacing:2px; }
  .chips{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .chip{ border:1px solid rgba(255,255,255,.35); background:rgba(255,255,255,.10); color:#fff;
    border-radius:999px; padding:8px 14px; font:inherit; font-weight:800; font-size:14px; cursor:pointer; }
  .chip.on{ background:linear-gradient(135deg,#ffe14d,#ff9d2e); color:#3a2700; border-color:transparent; }
  /* ---- 高對比（無障礙）---- */
  body.hc #score{ -webkit-text-stroke:2px #000; }
  body.hc #meta, body.hc #combo, body.hc #items{ -webkit-text-stroke:1px #000; }
  body.hc .chip{ font-size:16px; }
  body.hc .lb-list li{ font-size:16.5px; }
  /* ---- 排行榜分頁 ---- */
  .lb-tabs{ display:flex; gap:6px; margin-bottom:8px; }
  .lbtab{ flex:1; border:none; border-radius:8px; padding:6px 4px; font:inherit; font-weight:800;
    font-size:13px; cursor:pointer; background:rgba(255,255,255,.12); color:#fff; }
  .lbtab.on{ background:linear-gradient(135deg,#ffe14d,#ff9d2e); color:#3a2700; }
  .lb-list li .cls{ font-size:12px; opacity:.8; margin:0 6px; flex:none; }
  #classInput{ width:96px; flex:none !important; }
  .btn-lite{ border:1px solid rgba(255,255,255,.4); background:rgba(255,255,255,.12); color:#fff;
    border-radius:999px; padding:10px 18px; font:inherit; font-weight:800; font-size:15px; cursor:pointer;
    margin-top:8px; text-decoration:none; display:inline-block; }
  /* ---- 橫幅（Boss / 提示）---- */
  #banner{ position:absolute; top:38%; left:50%; transform:translate(-50%,-50%) scale(.8);
    font-weight:900; font-size:clamp(26px,6.5vw,54px); color:#fff; text-align:center;
    text-shadow:0 4px 0 rgba(0,0,0,.3), 0 0 30px rgba(180,80,255,.75); opacity:0;
    transition:opacity .25s, transform .25s; pointer-events:none; white-space:nowrap; z-index:6; }
  #banner.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }

<body>

    <div id="combo"></div>
    <div id="items"></div>
    <div id="banner"></div>
    <div id="meta"><span class="scene" id="sceneName">晴空</span><br>最佳 <span id="best">0</span></div>
  </div>

  <div class="overlay" id="startScreen">
    <div class="title">皮卡丘天空大冒險 <span class="bolt">⚡</span></div>
    <div class="sub">選好難度與角色，點「開始」起飛！</div>
    <div class="big">最佳紀錄：<span id="bestStart">0</span></div>
    <div class="opt"><h4>難度</h4><div class="chips" id="diffChips">

      <button class="chip" data-skin="pika">皮卡丘⚡</button>

      <button class="chip" data-skin="grass">森林🌿</button>
    </div></div>
    <div class="opt"><h4>設定</h4><div class="chips" id="toggleChips">
      <button class="chip" data-tg="bgm">🎵 音樂</button>
      <button class="chip" data-tg="sfx">🔊 音效</button>

  <div class="overlay hidden" id="overScreen">

    <div class="big">得分 <span id="finalScore">0</span>　最佳 <span id="finalBest">0</span></div>
    <div class="sub" id="overTip">再接再厲！</div>
    <div class="submit-row" id="submitRow">
      <input id="nameInput" maxlength="12" placeholder="暱稱" autocomplete="off">
      <input id="classInput" maxlength="8" placeholder="班級" autocomplete="off">

      <div class="lb-title">🏆 班級排行榜</div>
      <div class="lb-tabs" id="tabsOver">
        <button class="lbtab on" data-tab="top">總榜</button>
        <button class="lbtab" data-tab="today">今日</button>
        <button class="lbtab" data-tab="class">我班</button>

      <ol class="lb-list" id="lbOverList"><li class="lb-empty">載入中…</li></ol>

    <button class="btn-lite" id="shareBtn">📸 下載成績卡分享</button>

  <div class="credit">⚡ 皮卡丘天空大冒險 3D｜Made with ❤️ by

<script type="module">
import * as THREE from "three";

// ===================== 場景色板（每 10 分換一個）=====================
const SCENES = [
  { name:"晴空", sky:0xaee3ff, fog:0xcfecff, pipe:0x5cb24a, ground:0x86cf72, light:0xffffff, amb:0x88bbff, wx:null },
  { name:"黃昏", sky:0xff9a6b, fog:0xffd2a8, pipe:0xc8723f, ground:0xd6a064, light:0xffd2a0, amb:0xff9c6e, wx:null },
  { name:"星夜", sky:0x16224e, fog:0x26356c, pipe:0x7b6ad6, ground:0x2b3666, light:0xb9c2ff, amb:0x3a4a8c, wx:{color:0xffffff, dir:-1, spd:1.4, size:0.06} },
  { name:"極光", sky:0x0f3d3a, fog:0x166054, pipe:0x2bd4a8, ground:0x1f6f5c, light:0xc0ffe9, amb:0x2fa888, wx:{color:0xa8ffe0, dir:-1, spd:1.0, size:0.07} },
  { name:"櫻花", sky:0xffc2e0, fog:0xffd9ec, pipe:0xe57aa8, ground:0xf2a8c6, light:0xffe2f0, amb:0xff9ec8, wx:{color:0xffd0e8, dir:-1, spd:2.0, size:0.12} },
  { name:"深海", sky:0x0a3a6b, fog:0x135594, pipe:0x19a0c9, ground:0x10708f, light:0xc6ecff, amb:0x2a78b8, wx:{color:0xcdefff, dir:1, spd:1.6, size:0.10} },
];

// ===================== 難度 / 角色 設定 =====================
const DIFF = {
  easy:   { gapHalf:2.75, speed:4.2, grav:-18.5, flap:7.4, dx:6.2, label:"簡單" },
  normal: { gapHalf:2.35, speed:4.8, grav:-20.5, flap:7.7, dx:5.6, label:"普通" },
  hard:   { gapHalf:1.95, speed:5.5, grav:-22.5, flap:8.1, dx:5.2, label:"挑戰" },
};
const SKINS = {
  pika:  { body:0xffd21a, name:"皮卡丘" },
  fire:  { body:0xff7a3c, name:"烈焰" },
  water: { body:0x59b6ff, name:"海洋" },
  grass: { body:0x7bd66a, name:"森林" },
};
const SET = {
  diff: localStorage.getItem("pika3d_diff") || "normal",
  skin: localStorage.getItem("pika3d_skin") || "pika",
  bgm:  localStorage.getItem("pika3d_bgm") !== "0",
  sfx:  localStorage.getItem("pika3d_sfx") !== "0",
  hc:   localStorage.getItem("pika3d_hc") === "1",
};

// 物理參數（依難度填入）
const PX = -4.2;
const FLOOR_Y = -6.0, CEIL_Y = 6.6;
const PIPE_R = 0.95, HIT_R = 0.6, SPAWN_X = 14;
let GAP_HALF = 2.35, BASE_SPEED = 4.8, GRAVITY = -20.5, FLAP = 7.7, SPAWN_DX = 5.6;
function applyDifficulty(){
  const d = DIFF[SET.diff] || DIFF.normal;
  GAP_HALF = d.gapHalf; BASE_SPEED = d.speed; GRAVITY = d.grav; FLAP = d.flap; SPAWN_DX = d.dx;
}
applyDifficulty();

// ===================== 三維場景 =====================
const app = document.getElementById("app");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(1.6, 0.6, 13);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

scene.fog = new THREE.Fog(0xcfecff, 14, 34);

const amb = new THREE.AmbientLight(0x88bbff, 0.85);
scene.add(amb);
const sun = new THREE.DirectionalLight(0xffffff, 1.25);
sun.position.set(6, 12, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left=-18; sun.shadow.camera.right=18;
sun.shadow.camera.top=18; sun.shadow.camera.bottom=-18;
sun.shadow.camera.near=1; sun.shadow.camera.far=60;
scene.add(sun);

const groundMat = new THREE.MeshStandardMaterial({ color:0x86cf72, roughness:1 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(120, 60), groundMat);
ground.rotation.x = -Math.PI/2; ground.position.y = FLOOR_Y - 0.1; ground.receiveShadow = true;
scene.add(ground);

// 雲朵
const cloudMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:1, transparent:true, opacity:0.95 });
const clouds = [];
function makeCloud(x){
  const g = new THREE.Group();
  for(let i=0;i<4;i++){
    const r = 0.8 + Math.random()*0.9;
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 14, 12), cloudMat);
    m.position.set((Math.random()-0.5)*2.6, (Math.random()-0.5)*0.8, (Math.random()-0.5)*1.2);
    g.add(m);
  }
  g.position.set(x, 2 + Math.random()*4, -6 - Math.random()*8);
  scene.add(g); clouds.push(g); return g;
}
for(let i=0;i<8;i++) makeCloud((Math.random()-0.5)*40);

// ===================== 皮卡丘 =====================
const pika = new THREE.Group();
const matBody  = new THREE.MeshStandardMaterial({ color:0xffd21a, roughness:0.55 });
const matBlack = new THREE.MeshStandardMaterial({ color:0x2b2b2b, roughness:0.6 });
const matRed   = new THREE.MeshStandardMaterial({ color:0xff5a5a, roughness:0.7 });
const matWhite = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.4 });
const matBrown = new THREE.MeshStandardMaterial({ color:0x7a4a00, roughness:0.7 });
function applySkin(){ matBody.color.set((SKINS[SET.skin]||SKINS.pika).body); }
applySkin();

const body = new THREE.Mesh(new THREE.SphereGeometry(0.95, 28, 24), matBody);
body.scale.set(1, 0.96, 0.92); body.castShadow = true; pika.add(body);
function ear(side){
  const e = new THREE.Group();
  const base = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.0, 14), matBody); base.castShadow = true; e.add(base);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.21, 0.34, 14), matBlack); tip.position.y = 0.45; e.add(tip);
  e.position.set(-0.12, 0.85, side*0.42); e.rotation.z = side*0.18; e.rotation.x = -side*0.32;
  pika.add(e); return e;
}
const earL = ear(1), earR = ear(-1);
function eye(z){
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 14), matBlack));
  const w = new THREE.Mesh(new THREE.SphereGeometry(0.055, 10, 8), matWhite); w.position.set(0.1, 0.07, 0.05); g.add(w);
  g.position.set(0.66, 0.28, z); pika.add(g);
}
eye(0.34); eye(-0.34);
function cheek(z){
  const c = new THREE.Mesh(new THREE.SphereGeometry(0.18, 14, 12), matRed);
  c.scale.set(0.6,1,1); c.position.set(0.6, -0.12, z); pika.add(c);
}
cheek(0.56); cheek(-0.56);
const nose = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), matBlack);
nose.position.set(0.94, 0.05, 0); pika.add(nose);
const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.025, 8, 16, Math.PI), matBrown);
mouth.position.set(0.9, -0.12, 0); mouth.rotation.z = -Math.PI/2; mouth.rotation.y = Math.PI/2; pika.add(mouth);
const tailShape = new THREE.Shape();
tailShape.moveTo(0,0); tailShape.lineTo(0.42,0.05); tailShape.lineTo(0.18,0.5);
tailShape.lineTo(0.62,0.55); tailShape.lineTo(0.25,1.15); tailShape.lineTo(0.3,0.62);
tailShape.lineTo(0.02,0.55); tailShape.lineTo(0.22,0.12); tailShape.lineTo(0,0);
const tail = new THREE.Mesh(new THREE.ExtrudeGeometry(tailShape, {depth:0.12, bevelEnabled:false}), matBody);
tail.position.set(-0.9, -0.2, 0); tail.rotation.z = 0.5; tail.castShadow = true; pika.add(tail);

pika.position.set(PX, 0, 0); pika.rotation.y = 0.45; scene.add(pika);

// ===================== 柱子 =====================
const pipeMat = new THREE.MeshStandardMaterial({ color:0x5cb24a, roughness:0.6 });
const pipes = [];
let lastGapY = 0;
function makePipe(x){
  const g = new THREE.Group();
  const MAX_DELTA = 2.6, RANGE = 3.0;
  let gy = lastGapY + (Math.random()*2-1)*MAX_DELTA;
  gy = Math.max(-RANGE, Math.min(RANGE, gy));
  lastGapY = gy;
  g.userData.gapY = gy; g.userData.passed = false;
  // 障礙變化：分數高 / 挑戰難度時，部分柱子上下擺動
  const moving = bossActive || (SET.diff==="hard" && score>=6) || score>=12;
  g.userData.osc = (moving && Math.random()<0.5) ? { amp:0.7+Math.random()*0.9, w:1.0+Math.random()*0.8, ph:Math.random()*6.28 } : null;
  const mkCol = (cy, h) => { const m = new THREE.Mesh(new THREE.CylinderGeometry(PIPE_R, PIPE_R, h, 20), pipeMat);
    m.position.set(0, cy, 0); m.castShadow = true; m.receiveShadow = true; return m; };
  const mkCap = (cy) => { const m = new THREE.Mesh(new THREE.CylinderGeometry(PIPE_R*1.18, PIPE_R*1.18, 0.5, 20), pipeMat);
    m.position.set(0, cy, 0); m.castShadow = true; return m; };
  const topH = (CEIL_Y + 2) - (gy + GAP_HALF);
  g.add(mkCol(gy + GAP_HALF + topH/2, topH)); g.add(mkCap(gy + GAP_HALF + 0.25));
  const botH = (gy - GAP_HALF) - (FLOOR_Y - 2);
  g.add(mkCol(gy - GAP_HALF - botH/2, botH)); g.add(mkCap(gy - GAP_HALF - 0.25));
  g.position.x = x; scene.add(g); pipes.push(g);
  // 道具：分數≥3 後機率在 gap 附近生成
  if(score>=3 && Math.random()<0.30) spawnItem(x + SPAWN_DX*0.5, gy + (Math.random()-0.5)*1.4);
  return g;
}

let AC = null;
const ac = () => { if(!AC){ try{ AC = new (AudioContext||webkitAudioContext)(); }catch(e){} } return AC; };
function beep(f, d, type="sine", v=0.16, to=null){
  if(!SET.sfx) return;
  const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type=type; o.frequency.value=f;
  if(to) o.frequency.exponentialRampToValueAtTime(to, a.currentTime+d);
  g.gain.setValueAtTime(v, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+d);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+d);
}

  [392,494,587,494,440,587,659,494],
  [523,587,698,587,523,659,784,659],

];

function startBGM(){

function update(dt){
  const t = performance.now()*0.001;
  clouds.forEach(c=>{ c.position.x -= speed*0.18*dt; if(c.position.x < -22){ c.position.x = 22; c.position.y = 2+Math.random()*4; } });
  if(trans<1){ trans=Math.min(1, trans + dt*1.5); applyScene(trans); }
  earL.rotation.x += (-0.32 - earL.rotation.x)*Math.min(1,dt*8);
  earR.rotation.x += ( 0.32 - earR.rotation.x)*Math.min(1,dt*8);

  // 天氣粒子
  const wx = SCENES[sceneIdx].wx;
  if(wx){ weather.forEach(m=>{ if(!m.visible) return;
    m.position.y += wx.dir * wx.spd * dt;
    m.position.x += Math.sin(t + m.position.y)*0.4*dt;
    if(wx.dir<0 && m.position.y < -8){ m.position.y = 9; m.position.x=(Math.random()-0.5)*26; }
    if(wx.dir>0 && m.position.y > 9){ m.position.y = -8; m.position.x=(Math.random()-0.5)*26; }
  }); }

  // Boss 雷雲動畫
  if(bossMesh && bossMesh.visible){ bossT+=dt; bossMesh.rotation.y+=dt*0.8;
    bossMesh.position.y = 4.5 + Math.sin(bossT*2)*0.5; bossMesh.position.x += (1-bossMesh.position.x)*Math.min(1,dt*1.2); }
  // 粒子
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; const v=p.userData.v;
    p.position.x += v.x*dt; p.position.y += v.y*dt; p.position.z += v.z*dt; v.y -= 9*dt;
    p.userData.life -= dt; p.scale.multiplyScalar(1 - dt*1.5);
    if(p.userData.life<=0){ scene.remove(p); parts.splice(i,1); }
  }

  if(state!==ST.PLAY){ pika.position.y += Math.sin(performance.now()*0.003)*0.004; renderEffectsIdle(dt); return; }
  frame++;

  // 效果計時
  if(invincT>0){ invincT=Math.max(0,invincT-dt); if(invincT===0){ setGlow(); updateItemsHUD(); } }
  if(dblT>0){ dblT=Math.max(0,dblT-dt); if(dblT===0){ setGlow(); updateItemsHUD(); } }
  if((invincT>0||dblT>0) && frame%6===0) updateItemsHUD();

  vy += GRAVITY*dt; pika.position.y += vy*dt;
  pika.rotation.z = Math.max(-0.6, Math.min(0.5, vy*0.06));
  pika.rotation.y = 0.45 + Math.sin(performance.now()*0.004)*0.06;
  tail.rotation.z = 0.5 + Math.sin(performance.now()*0.01)*0.12;
  if(invincT>0) pika.rotation.y += 0.2;  // 無敵時轉更快

  // 柱子移動 + 擺動
  pipes.forEach(p=>{ p.position.x -= speed*dt; if(p.userData.osc){ const o=p.userData.osc; p.position.y = o.amp*Math.sin(t*o.w+o.ph); } });

  // 計分
  pipes.forEach(p=>{
    if(!p.userData.passed && p.position.x < PX){
      p.userData.passed=true;
      const perfect = Math.abs(pika.position.y - pipeGapY(p)) < 0.9;
      if(perfect) combo++; else combo=0;
      let gain = 1; if(dblT>0) gain*=2; if(perfect && combo>=3) gain+=1;
      score += gain; sScore(combo);
      $("score").textContent = score; updateComboHUD();
      burst(PX+0.5, pika.position.y, perfect?0xffe14d:0xffffff, perfect?8:4, 2.5);
      if(combo>0 && combo%5===0) burst(PX, pika.position.y, 0xff5ad6, 14, 4);
      if(score%10===0){ setScene((sceneIdx+1)%SCENES.length, false); trans=0; sScene(); }
      speed = BASE_SPEED + Math.min(2.0, score*0.03);
      if(bossActive){ bossPipesLeft--; if(bossPipesLeft<=0) endBoss(); }
      else if(score>0 && score%50===0) startBoss();
    }
  });
  if(pipes.length && pipes[0].position.x < -16){
    const old=pipes.shift(); scene.remove(old);
    makePipe(pipes[pipes.length-1].position.x + SPAWN_DX);
  }

  // 道具移動 + 收集
  for(let i=items.length-1;i>=0;i--){ const m=items[i];
    m.position.x -= speed*dt; m.rotation.y += dt*3; m.rotation.x += dt*1.5;
    m.scale.setScalar(1 + Math.sin(t*4)*0.12);
    if(m.position.x < -16){ scene.remove(m); items.splice(i,1); continue; }
    const dx=m.position.x-pika.position.x, dy=m.position.y-pika.position.y;
    if(dx*dx+dy*dy < 1.3*1.3){ activate(m.userData.type); burst(m.position.x,m.position.y,ITEMS[m.userData.type].color,12,4); scene.remove(m); items.splice(i,1); }
  }

  // 碰撞
  if(trans>=1){
    const inv = invincT>0;
    if(pika.position.y - HIT_R < FLOOR_Y || pika.position.y + HIT_R > CEIL_Y){
      if(inv) pika.position.y = Math.max(FLOOR_Y+HIT_R, Math.min(CEIL_Y-HIT_R, pika.position.y));
      else return die();
    }
    if(!inv){
      for(const p of pipes){
        if(Math.abs(p.position.x - PX) < PIPE_R + HIT_R){
          const gy = pipeGapY(p);
          if(pika.position.y - HIT_R < gy - GAP_HALF || pika.position.y + HIT_R > gy + GAP_HALF){
            if(shieldOn){ shieldOn=false; invincT=Math.max(invincT,0.9); setGlow(); updateItemsHUD();
              burst(PX, pika.position.y, 0x4ad6ff, 14, 4); sItem(); }
            else return die();
          }
        }
      }
    }
  } else {
    pika.position.y = Math.max(FLOOR_Y+HIT_R, Math.min(CEIL_Y-HIT_R, pika.position.y));
  }
}
function renderEffectsIdle(dt){ /* 選單/結算時道具粒子已在上方處理，這裡保留擴充點 */ }

// ===================== 主迴圈 =====================
const clock = new THREE.Clock();
let started=false;
function loop(){
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
  if(!started){ started=true; $("loading").style.display="none"; }
}
setScene(0, true); reset(); state=ST.MENU; loop();

// ===================== autopilot（驗證用 ?autopilot=1）=====================
if(new URLSearchParams(location.search).get("autopilot")==="1"){
  start();
  (function ap(){
    if(state===ST.OVER) start();
    if(state===ST.PLAY){
      const next = pipes.find(p=>p.position.x + PIPE_R + HIT_R > PX) || pipes[0];
      const target = pipeGapY(next) - 0.2;
      if(pika.position.y < target && vy < 1.5) vy = FLAP * 0.62;
    }
    requestAnimationFrame(ap);
  })();
}
</script>

<script>
/* ===== Service Worker 註冊 + 版本更新通知列 ===== */
(function(){
  if(!('serviceWorker' in navigator)) return;
  var APP_VERSION='2026.06.22-3';   // 與 sw.js / version.json 同步
  var reloaded=false;
  function showBar(waiting){
    if(document.getElementById('sw-update-bar')) return;
    var s=document.createElement('style');
    s.textContent='#sw-update-bar{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:12px;background:#1e1b4b;color:#fff;padding:12px 16px;border-radius:14px;box-shadow:0 14px 34px -10px rgba(0,0,0,.55);font:14.5px system-ui,sans-serif;max-width:calc(100vw - 28px)}#sw-update-bar button{cursor:pointer;border:none;border-radius:9px;font-weight:700;font:inherit}#sw-go{background:linear-gradient(135deg,#ffe14d,#ff9d2e);color:#3a2700;padding:8px 15px}#sw-x{background:transparent;color:#aeb6d4;padding:6px 9px}';
    document.head.appendChild(s);
    var b=document.createElement('div'); b.id='sw-update-bar'; b.setAttribute('role','status');
    b.innerHTML='<span>✦ 遊戲有新版本</span><button id="sw-go">重新整理載入</button><button id="sw-x">✕</button>';
    document.body.appendChild(b);
    document.getElementById('sw-x').onclick=function(){ b.remove(); };
    document.getElementById('sw-go').onclick=function(){ waiting ? waiting.postMessage({type:'SKIP_WAITING'}) : location.reload(); };
  }
  navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).then(function(reg){
    if(reg.waiting && navigator.serviceWorker.controller) showBar(reg.waiting);
    reg.addEventListener('updatefound',function(){
      var nw=reg.installing; if(!nw) return;
      nw.addEventListener('statechange',function(){
        if(nw.state==='installed' && navigator.serviceWorker.controller) showBar(reg.waiting||nw);
      });
    });
    setInterval(function(){ reg.update().catch(function(){}); }, 60000);
  }).catch(function(){});
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(reloaded) return; reloaded=true; location.reload();
  });
  function checkVer(){ fetch('version.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json())
    .then(function(d){ if(d&&d.version&&d.version!==APP_VERSION) showBar(null); }).catch(function(){}); }
  ['focus','online','pageshow'].forEach(function(ev){ window.addEventListener(ev,checkVer); });
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible') checkVer(); });
  setTimeout(checkVer,8000); setInterval(checkVer,180000);
})();
</script>
